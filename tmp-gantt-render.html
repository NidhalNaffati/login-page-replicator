const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.fillStyle = '#ffffff';
ctx.fillRect(0,0,canvas.width, canvas.height);
ctx.textBaseline = 'top';

function drawRect(el) {
  const x = el.x - 10 + 24;
  const y = el.y - 20 + 24;
  const width = el.width || 0;
  const height = el.height || 0;
  const bg = el.backgroundColor || '#ffffff';
  const stroke = el.strokeColor || '#000000';
  ctx.fillStyle = bg;
  ctx.fillRect(x, y, width, height);
  if (el.strokeWidth && el.strokeWidth > 0) {
    ctx.strokeStyle = stroke;
    ctx.lineWidth = (el.strokeWidth || 1);
    ctx.strokeRect(x + 0.5, y + 0.5, width - 1, height - 1);
  }
}

function drawText(el) {
  const x = el.x - 10 + 24;
  const y = el.y - 20 + 24;
  const text = (el.text || '');
  const fontSize = el.fontSize || 14;
  const color = el.strokeColor || '#000000';
  const align = el.textAlign || 'left';
  ctx.fillStyle = color;
  ctx.font = fontSize + 'px sans-serif';
  if (align === 'center') {
    ctx.textAlign = 'center';
    const cx = x + (el.width || 0)/2;
    // vertical center approximate
    const lines = text.split('
');
    const lineHeight = fontSize * 1.2;
    const totalH = lines.length * lineHeight;
    let startY = y + ((el.height || 0) - totalH)/2;
    for (const line of lines) {
      ctx.fillText(line, cx, startY);
      startY += lineHeight;
    }
  } else {
    ctx.textAlign = 'left';
    // simple single-line or wrapped
    const lines = text.split('
');
    const lineHeight = fontSize * 1.2;
    let yy = y;
    for (const line of lines) {
      ctx.fillText(line, x + 4, yy + 4);
      yy += lineHeight;
    }
  }
}

for (const el of elements) {
  if (el.type === 'rectangle') drawRect(el);
  if (el.type === 'text') drawText(el);
}

window.renderDone = true;

# ⚠️  SECURITY DEMO — INTENTIONALLY VULNERABLE (for OWASP ZAP scan showcase) ⚠️
server {
    listen 80;
    server_name localhost;

    # VULN: Expose nginx version in Server header (ZAP: "Server Leaks Version Information")
    server_tokens on;

    root /usr/share/nginx/html;
    index index.html;

    # VULN: Leak technology stack via custom header (ZAP: information disclosure)
    add_header X-Powered-By "Nginx/1.21 + React 18";

    # VULN: Missing security headers — all of these will be flagged by ZAP:
    #   - No Content-Security-Policy (CSP)
    #   - No X-Frame-Options (clickjacking)
    #   - No X-Content-Type-Options (MIME sniffing)
    #   - No Strict-Transport-Security (HSTS)
    #   - No Referrer-Policy
    #   - No Permissions-Policy

    # Support React Router (client-side routing)
    location / {
        # VULN: Directory listing enabled (ZAP: "Directory Browsing")
        autoindex on;
        try_files $uri $uri/ /index.html;
    }

    # VULN: No cache-control on static assets — stale content / cache poisoning
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires -1;
        add_header Cache-Control "no-store";
        add_header X-Powered-By "Nginx/1.21 + React 18";
    }

    # Nginx exporter sidecar scrapes this endpoint from localhost.
    location /stub_status {
        stub_status on;
        allow 127.0.0.1;
        deny all;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

# SonarQube project configuration for private, self-hosted analysis.
# Keep the project key/org values aligned with your SonarQube server setup.

sonar.projectKey=todo-app
sonar.projectName=todo-app
sonar.sourceEncoding=UTF-8

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.{test,spec}.{ts,tsx}

sonar.exclusions=dist/**,node_modules/**,playwright-report/**,test-results/**,coverage/**,**/*.d.ts

# Optional: enable once CI exports LCOV coverage.
# sonar.javascript.lcov.reportPaths=coverage/lcov.info


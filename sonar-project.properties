# ?? Project identification (update these after SonarCloud onboarding) ??????
sonar.projectKey=NidhalNaffati_login-page-replicator
sonar.organization=nidhalnaffati

# ?? Source & test directories ??????????????????????????????????????????????
sonar.sources=src
sonar.tests=src/test
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx,src/**/*.spec.ts,src/**/*.spec.tsx

# ?? Exclusions ? auto-generated shadcn UI components add noise ?????????????
sonar.exclusions=src/components/ui/**,node_modules/**,dist/**,coverage/**

# ?? TypeScript configuration ??????????????????????????????????????????????
sonar.typescript.tsconfigPaths=tsconfig.app.json

# ?? Coverage reports (generated by vitest + @vitest/coverage-v8) ??????????
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ?? Encoding ??????????????????????????????????????????????????????????????
sonar.sourceEncoding=UTF-8


# ⚠️  SECURITY DEMO — INTENTIONALLY VULNERABLE (for Trivy IaC scan showcase) ⚠️
apiVersion: apps/v1
kind: Deployment
metadata:
  name: login-page-replicator
  namespace: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: login-page-replicator
  template:
    metadata:
      labels:
        app: login-page-replicator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9113"
    spec:
      serviceAccountName: gke-app-sa
      # VULN: Use host network namespace (Trivy: KSV023)
      hostNetwork: true
      # VULN: Automount SA token even though it's not needed (Trivy: KSV036)
      automountServiceAccountToken: true
      containers:
        - name: app
          image: europe-west1-docker.pkg.dev/pfe-esprit-489411/login-page-replicator-repo/login-page-replicator:b229abf
          ports:
            - containerPort: 80
          # VULN: Privileged container running as root (Trivy: KSV001, KSV012, KSV017)
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            privileged: true
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: false
            capabilities:
              add:
                - NET_ADMIN
                - SYS_ADMIN
          # VULN: No resource limits (Trivy: KSV011)
          # VULN: No readiness/liveness probe
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:1.1.0
          args:
            - -nginx.scrape-uri=http://127.0.0.1/stub_status
          ports:
            - containerPort: 9113
              name: metrics
          # VULN: Privileged exporter sidecar too
          securityContext:
            runAsNonRoot: false
            privileged: true
            allowPrivilegeEscalation: true


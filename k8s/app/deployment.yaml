# ⚠️  SECURITY DEMO — INTENTIONALLY WEAKENED (for Trivy IaC scan showcase) ⚠️
# Note: extreme misconfigs (privileged, hostNetwork, SYS_ADMIN) are in
#       k8s/vulnerable-demo/deployment.yaml — GKE Autopilot rejects them here.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: login-page-replicator
  namespace: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: login-page-replicator
  template:
    metadata:
      labels:
        app: login-page-replicator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9113"
    spec:
      serviceAccountName: gke-app-sa
      # VULN: Automount SA token even though it's not needed (Trivy: KSV036)
      automountServiceAccountToken: true
      containers:
        - name: app
          image: europe-west1-docker.pkg.dev/pfe-esprit-489411/login-page-replicator-repo/login-page-replicator:1adb2c6
          ports:
            - containerPort: 80
          # VULN: No resource limits defined (Trivy: KSV011)
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
          # VULN: No readiness/liveness probe defined
          # VULN: No securityContext → defaults to root, writable rootfs, etc.
          #       (Trivy: KSV012 runAsNonRoot not set, KSV014 readOnlyRootFilesystem not set)
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:1.1.0
          args:
            - -nginx.scrape-uri=http://127.0.0.1/stub_status
          ports:
            - containerPort: 9113
              name: metrics
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi


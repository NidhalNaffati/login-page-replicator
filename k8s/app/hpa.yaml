apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: login-page-replicator-hpa
  namespace: app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: login-page-replicator
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60


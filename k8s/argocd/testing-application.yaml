apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: login-page-replicator-testing
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/NidhalNaffati/login-page-replicator
    targetRevision: HEAD
    # Manages the testing namespace ServiceAccount only.
    # The Playwright e2e job is now a PostSync hook inside k8s/app/playwright-hook.yaml
    # and is run automatically by Argo CD after every app sync — visible in the Argo CD UI.
    path: k8s/testing
  destination:
    server: https://kubernetes.default.svc
    namespace: testing
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false


apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-wazuh-agent-egress
  namespace: security
spec:
  podSelector:
    matchLabels:
      app: wazuh-agent
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.10.0.2/32
      ports:
        - protocol: TCP
          port: 1514
        - protocol: TCP
          port: 1515


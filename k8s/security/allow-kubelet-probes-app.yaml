# Allow Kubelet probes to reach the app pods from the node IP range.
# Required because default-deny-all drops everything, and in some setups probe IPs are dropped.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kubelet-probes-app
  namespace: app
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            # Assumes 10.10.0.0/20 is the VPC/subnet block for nodes
            cidr: 10.10.0.0/20
        - ipBlock:
            # GCP Load Balancer health check ranges
            cidr: 130.211.0.0/22
        - ipBlock:
            # GCP Load Balancer health check ranges
            cidr: 35.191.0.0/16
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 9113

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-observability-to-app-metrics
  namespace: observability
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: app
          podSelector:
            matchLabels:
              app: login-page-replicator
      ports:
        - protocol: TCP
          port: 9113


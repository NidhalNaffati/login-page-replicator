# Allow pods in any namespace to query kube-dns (CoreDNS) on port 53.
# Without this, the default-deny-all policy breaks ALL DNS resolution,
# causing readiness probes and inter-service calls to fail.

# ── app namespace ─────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: app
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---

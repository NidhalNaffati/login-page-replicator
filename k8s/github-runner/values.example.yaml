# Example values for an ARC-managed runner deployment.
# This is a template only; adapt to your ARC chart/version and auth mode.

runnerLabels:
  - gke
  - sonar

# Prefer ephemeral runners for isolation.
ephemeral: true

# Keep resources modest for Sonar scans; tune as needed.
resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "2"
    memory: "4Gi"

# Pod-level security baseline.
podSecurityContext:
  runAsNonRoot: true
  fsGroup: 1001

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false

# Optional node isolation for runner workloads.
# nodeSelector:
#   workload: github-runner

# Optional tolerations for dedicated nodes.
# tolerations:
#   - key: "workload"
#     operator: "Equal"
#     value: "github-runner"
#     effect: "NoSchedule"


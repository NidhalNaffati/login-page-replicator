apiVersion: batch/v1
kind: Job
metadata:
  name: playwright-tests
  namespace: testing
  labels:
    app.kubernetes.io/name: playwright-tests
    app.kubernetes.io/part-of: login-page-replicator
spec:
  backoffLimit: 0
  # Keep completed jobs around long enough to inspect them from the cluster
  # and from Argo CD when the optional testing Application is enabled.
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      serviceAccountName: playwright-runner
      restartPolicy: Never
      imagePullSecrets:
        - name: ar-pull-secret
      containers:
        - name: playwright
          # IMAGE_TAG is replaced by GitHub Actions before kubectl apply
          image: europe-west1-docker.pkg.dev/pfe-esprit-489411/login-page-replicator-repo/playwright-tests:IMAGE_TAG
          env:
            - name: BASE_URL
              value: http://login-page-replicator.app.svc.cluster.local
            - name: CI
              value: "true"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi

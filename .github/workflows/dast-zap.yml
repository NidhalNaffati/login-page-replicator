name: DAST - OWASP ZAP Baseline

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL to scan (e.g. https://your-staging.example.com)"
        required: false
        type: string
      fail_on_warning:
        description: "Fail workflow when ZAP reports warnings"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  zap-baseline:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TARGET_URL: ${{ github.event.inputs.target_url || vars.DAST_TARGET_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve target URL
        run: |
          if [ -z "${TARGET_URL}" ]; then
            echo "No target URL provided."
            echo "Set workflow_dispatch input 'target_url' or repository variable 'DAST_TARGET_URL'."
            exit 1
          fi
          echo "Scanning target: ${TARGET_URL}"

      - name: Run ZAP Baseline
        id: zap
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ env.TARGET_URL }}
          rules_file_name: .zap/rules.tsv
          cmd_options: >-
            -a
            -m 10
            -r zap-report.html
            -w zap-report.md
            -J zap-report.json
            -d
          fail_action: ${{ github.event.inputs.fail_on_warning == 'true' }}

      - name: Upload ZAP report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-${{ github.run_id }}
          path: |
            zap-report.html
            zap-report.md
            zap-report.json
          if-no-files-found: warn
          retention-days: 14


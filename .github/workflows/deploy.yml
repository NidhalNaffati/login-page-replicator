name: CI (GitHub Actions) + CD (Argo CD) + Playwright Reports

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Run image push + GitOps manifest update (Argo CD deploy)?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  PROJECT_ID:   pfe-esprit-489411
  REGION:       europe-west1
  REPO_NAME:    login-page-replicator-repo
  SERVICE_NAME: login-page-replicator
  IMAGE_BASE:   europe-west1-docker.pkg.dev/pfe-esprit-489411/login-page-replicator-repo/login-page-replicator
  PW_IMAGE:     europe-west1-docker.pkg.dev/pfe-esprit-489411/login-page-replicator-repo/playwright-tests

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Build & Test (runs on every push, PR, and manual trigger)
  # ────────────────────────────────────────────────────────────────────────────
  build-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint || true   # non-blocking — remove "|| true" to enforce

      - name: Run unit tests
        run: bun run test

      - name: Build (type-check + vite build)
        run: bun run build

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1b — Playwright e2e (local runner, no GKE) — runs on every push & PR
  # Spins up the Vite dev server, runs all tests, and publishes JUnit results.
  # ────────────────────────────────────────────────────────────────────────────
  e2e-local:
    name: 🎭 Playwright e2e (local)
    runs-on: ubuntu-latest
    needs: build-test

    permissions:
      contents: read
      checks: write        # publish JUnit summary as a GitHub check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bun x playwright install --with-deps chromium

      - name: Run Playwright e2e tests
        run: bun x playwright test
        env:
          CI: "true"
          BASE_URL: "http://localhost:8080"

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-local-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 14

      - name: Publish JUnit report
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: test-results/junit.xml
          check_name: Playwright E2E Results
          detailed_summary: true
          fail_on_failure: true
          require_tests: true

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build image, push, and update GitOps manifest
  # Runs on: push to main/master, manual dispatch with deploy=true
  # Skipped on: pull_requests, manual dispatch with deploy=false
  # ────────────────────────────────────────────────────────────────────────────
  build-push:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    needs: build-test
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')

    permissions:
      contents: write      # needed to commit the updated image tag back to the repo
      id-token: write      # needed for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Verify secrets are injected ───────────────────────────────────────
      - name: Verify GCP secrets are set
        env:
          WIF: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          SA:  ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          MISSING=0
          if [ -z "${WIF}" ]; then
            echo "❌ GCP_WORKLOAD_IDENTITY_PROVIDER is EMPTY or NOT SET"
            MISSING=1
          else
            echo "✅ GCP_WORKLOAD_IDENTITY_PROVIDER is set (length: ${#WIF})"
          fi
          if [ -z "${SA}" ]; then
            echo "❌ GCP_SERVICE_ACCOUNT is EMPTY or NOT SET"
            MISSING=1
          else
            echo "✅ GCP_SERVICE_ACCOUNT is set (length: ${#SA})"
          fi
          if [ "$MISSING" -eq 1 ]; then
            echo ""
            echo "👉 Go to: https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "   and add both secrets:"
            echo "   - GCP_WORKLOAD_IDENTITY_PROVIDER  (from: terraform output workload_identity_provider)"
            echo "   - GCP_SERVICE_ACCOUNT             (from: terraform output github_actions_sa_email)"
            exit 1
          fi

      # ── Authenticate to GCP via Workload Identity Federation ─────────────
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # ── Set up gcloud CLI ─────────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── Configure Docker to push to Artifact Registry ─────────────────────
      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # ── Build Docker image ────────────────────────────────────────────────
      - name: Build Docker image
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          docker build \
            --cache-from ${{ env.IMAGE_BASE }}:latest \
            -t ${{ env.IMAGE_BASE }}:${SHORT_SHA} \
            -t ${{ env.IMAGE_BASE }}:latest \
            .

      # ── Push both tags to Artifact Registry ───────────────────────────────
      - name: Push to Artifact Registry
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          docker push ${{ env.IMAGE_BASE }}:${SHORT_SHA}
          docker push ${{ env.IMAGE_BASE }}:latest

      # ── Update image tag in GitOps manifest and push — Argo CD picks it up ──
      - name: Update image tag in k8s manifest
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          sed -i "s|${{ env.SERVICE_NAME }}:.*|${{ env.SERVICE_NAME }}:${SHORT_SHA}|" k8s/app/deployment.yaml
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add k8s/app/deployment.yaml
          git diff --cached --quiet || \
            (git commit -m "ci: update image tag to ${SHORT_SHA}" && git push)

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Playwright e2e tests inside GKE
  # Runs after build-push and waits for Argo CD-delivered image rollout.
  # ────────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: 🎭 Playwright e2e (GKE)
    runs-on: ubuntu-latest
    needs: build-push

    permissions:
      contents: read
      id-token: write      # needed for Workload Identity Federation
      checks: write        # publish JUnit summary as a GitHub check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Authenticate to GCP ───────────────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # ── Build & push Playwright test image ────────────────────────────────
      - name: Build Playwright image
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          docker build \
            -t ${{ env.PW_IMAGE }}:${SHORT_SHA} \
            -f tests/Dockerfile .
          docker push ${{ env.PW_IMAGE }}:${SHORT_SHA}

      # ── Get GKE credentials ───────────────────────────────────────────────
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: devops-cluster
          location: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}

      # ── Create image-pull secret from live GCP token ─────────────────────
      - name: Create AR image-pull secret
        run: |
          kubectl apply -f k8s/namespaces.yaml
          kubectl apply -f k8s/testing/serviceaccount.yaml
          kubectl create secret docker-registry ar-pull-secret \
            --docker-server=europe-west1-docker.pkg.dev \
            --docker-username=oauth2accesstoken \
            --docker-password="$(gcloud auth print-access-token)" \
            --namespace=testing \
            --dry-run=client -o yaml | kubectl apply -f -

      # ── Wait until Argo CD has rolled out the new app image ───────────────
      - name: Wait for Argo-managed rollout
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "Waiting for deployment/${{ env.SERVICE_NAME }} image tag ${SHORT_SHA}..."
          FOUND=0
          for _ in {1..60}; do
            DEPLOYED_IMAGE=$(kubectl get deployment ${{ env.SERVICE_NAME }} -n app -o jsonpath='{.spec.template.spec.containers[?(@.name=="app")].image}' 2>/dev/null || true)
            if echo "${DEPLOYED_IMAGE}" | grep -q ":${SHORT_SHA}$"; then
              FOUND=1
              break
            fi
            sleep 10
          done

          if [ "${FOUND}" -ne 1 ]; then
            echo "Timed out waiting for Argo CD to apply image tag ${SHORT_SHA}."
            kubectl get deployment ${{ env.SERVICE_NAME }} -n app -o yaml || true
            exit 1
          fi

          kubectl apply -f k8s/namespaces.yaml
          kubectl apply -f k8s/security/allow-testing-to-app.yaml
          kubectl rollout status deployment/${{ env.SERVICE_NAME }} -n app --timeout=300s
          kubectl wait --for=jsonpath='{.subsets[0].addresses[0].ip}' endpoints/${{ env.SERVICE_NAME }} \
            -n app --timeout=120s

      # ── Inject SHA, delete old job, apply new one ─────────────────────────
      - name: Launch Playwright job on GKE
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          sed -i "s|playwright-tests:IMAGE_TAG|playwright-tests:${SHORT_SHA}|" \
            k8s/testing/playwright-job.yaml
          kubectl delete job playwright-tests -n testing --ignore-not-found
          kubectl apply -f k8s/testing/playwright-job.yaml

      # ── Wait for job to finish; collect logs immediately before pod GC ────
      - name: Wait for job & collect artifacts
        run: |
          # Wait up to 10 min for the job to complete (pass or fail)
          JOB_STATUS=0
          kubectl wait --for=condition=complete job/playwright-tests \
            -n testing --timeout=600s || JOB_STATUS=$?

          # Print logs regardless of outcome
          echo "=== Playwright pod logs ==="
          kubectl logs -l job-name=playwright-tests -n testing --prefix=true || true

          # Copy artifacts from the pod NOW (pod is still alive within ttlSecondsAfterFinished=300)
          mkdir -p artifacts/playwright-report artifacts/test-results
          POD_NAME=$(kubectl get pods -n testing -l job-name=playwright-tests \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)

          if [ -n "${POD_NAME}" ]; then
            echo "Copying artifacts from pod ${POD_NAME}..."
            kubectl cp "testing/${POD_NAME}:/tests/playwright-report/." "artifacts/playwright-report/" || true
            kubectl cp "testing/${POD_NAME}:/tests/test-results/."      "artifacts/test-results/"      || true
          else
            echo "⚠️  No playwright pod found; cannot copy artifacts."
          fi

          # Fail the step if the job itself failed
          if [ "${JOB_STATUS}" -ne 0 ]; then
            echo "❌ Playwright job failed (see logs above)."
            exit 1
          fi

      # ── Always upload raw artifact bundle ─────────────────────────────────
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-gke-${{ github.run_id }}
          path: |
            artifacts/playwright-report/
            artifacts/test-results/
          if-no-files-found: warn
          retention-days: 14

      # ── Publish JUnit check — requires actual test results ────────────────
      - name: Publish JUnit report
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: artifacts/test-results/junit.xml
          check_name: Playwright E2E Results (GKE)
          detailed_summary: true
          fail_on_failure: true
          require_tests: true


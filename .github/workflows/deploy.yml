name: CI/CD → Artifact Registry → Cloud Run

on:
  push:
    branches:
      - main        # Auto-deploy on every push to main
  pull_request:
    branches:
      - main        # Run build+test on PRs (no deploy)
  workflow_dispatch: # Allow manual trigger from GitHub UI

env:
  PROJECT_ID:   pfe-esprit-489411
  REGION:       europe-west1
  REPO_NAME:    login-page-replicator-repo
  SERVICE_NAME: login-page-replicator
  IMAGE_BASE:   europe-west1-docker.pkg.dev/pfe-esprit-489411/login-page-replicator-repo/login-page-replicator

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Build & Test
  # ────────────────────────────────────────────────────────────────────────────
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint || true   # non-blocking — remove "|| true" to enforce

      - name: Run tests
        run: bun run test

      - name: Build (type-check + vite build)
        run: bun run build

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Docker Build → Artifact Registry → Cloud Run
  # Only runs on push to main (not on PRs)
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-test                         # Wait for build+test to pass
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Authenticate to GCP using Service Account JSON key ────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── Set up gcloud CLI ─────────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── Configure Docker to push to Artifact Registry ─────────────────────
      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # ── Build Docker image with layer caching ─────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            --cache-from ${{ env.IMAGE_BASE }}:latest \
            -t ${{ env.IMAGE_BASE }}:${{ github.sha }} \
            -t ${{ env.IMAGE_BASE }}:latest \
            .

      # ── Push both tags to Artifact Registry ───────────────────────────────
      - name: Push to Artifact Registry
        run: |
          docker push ${{ env.IMAGE_BASE }}:${{ github.sha }}
          docker push ${{ env.IMAGE_BASE }}:latest

      # ── Deploy to Cloud Run ───────────────────────────────────────────────
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE_BASE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=80 \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --quiet

      # ── Print the live URL ────────────────────────────────────────────────
      - name: Get Service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format="value(status.url)")
          echo "✅ Deployed to: ${URL}"
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "url=${URL}" >> $GITHUB_OUTPUT

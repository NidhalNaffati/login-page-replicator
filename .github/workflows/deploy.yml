name: CI/CD → Artifact Registry → Cloud Run

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to Cloud Run after build?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  PROJECT_ID:   pfe-esprit-489411
  REGION:       europe-west1
  REPO_NAME:    login-page-replicator-repo
  SERVICE_NAME: login-page-replicator
  IMAGE_BASE:   europe-west1-docker.pkg.dev/pfe-esprit-489411/login-page-replicator-repo/login-page-replicator

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Build & Test (runs on every push, PR, and manual trigger)
  # ────────────────────────────────────────────────────────────────────────────
  build-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint || true   # non-blocking — remove "|| true" to enforce

      - name: Run tests
        run: bun run test

      - name: Build (type-check + vite build)
        run: bun run build

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Docker Build → Artifact Registry → Cloud Run
  # Runs on: push to main/master, manual dispatch with deploy=true
  # Skipped on: pull_requests, manual dispatch with deploy=false
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-test
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')

    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Verify secrets are injected ───────────────────────────────────────
      - name: Verify GCP secrets are set
        env:
          WIF: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          SA:  ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          MISSING=0
          if [ -z "${WIF}" ]; then
            echo "❌ GCP_WORKLOAD_IDENTITY_PROVIDER is EMPTY or NOT SET"
            MISSING=1
          else
            echo "✅ GCP_WORKLOAD_IDENTITY_PROVIDER is set (length: ${#WIF})"
          fi
          if [ -z "${SA}" ]; then
            echo "❌ GCP_SERVICE_ACCOUNT is EMPTY or NOT SET"
            MISSING=1
          else
            echo "✅ GCP_SERVICE_ACCOUNT is set (length: ${#SA})"
          fi
          if [ "$MISSING" -eq 1 ]; then
            echo ""
            echo "👉 Go to: https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "   and add both secrets:"
            echo "   - GCP_WORKLOAD_IDENTITY_PROVIDER"
            echo "   - GCP_SERVICE_ACCOUNT"
            exit 1
          fi

      # ── Authenticate to GCP via Workload Identity Federation ─────────────
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # ── Set up gcloud CLI ─────────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── Configure Docker to push to Artifact Registry ─────────────────────
      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # ── Build Docker image ────────────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            --cache-from ${{ env.IMAGE_BASE }}:latest \
            -t ${{ env.IMAGE_BASE }}:${{ github.sha }} \
            -t ${{ env.IMAGE_BASE }}:latest \
            .

      # ── Push both tags to Artifact Registry ───────────────────────────────
      - name: Push to Artifact Registry
        run: |
          docker push ${{ env.IMAGE_BASE }}:${{ github.sha }}
          docker push ${{ env.IMAGE_BASE }}:latest

      # ── Deploy to Cloud Run ───────────────────────────────────────────────
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE_BASE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=80 \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --quiet

      # ── Print the live URL ────────────────────────────────────────────────
      - name: Get Service URL
        id: service-url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format="value(status.url)")
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║  ✅ Deployment complete!                              ║"
          echo "║  🌐 Live URL: ${URL}"
          echo "╚══════════════════════════════════════════════════════╝"

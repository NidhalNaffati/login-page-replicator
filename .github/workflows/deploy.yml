name: CI (GitHub Actions) + CD (Argo CD) + Playwright Reports

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Run image push + GitOps manifest update (Argo CD deploy)?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  PROJECT_ID:   pfe-esprit-489411
  REGION:       europe-west1
  REPO_NAME:    login-page-replicator-repo
  SERVICE_NAME: login-page-replicator
  IMAGE_BASE:   europe-west1-docker.pkg.dev/pfe-esprit-489411/login-page-replicator-repo/login-page-replicator
  PW_IMAGE:     europe-west1-docker.pkg.dev/pfe-esprit-489411/login-page-replicator-repo/playwright-tests

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Build (runs on every push, PR, and manual trigger)
  # ────────────────────────────────────────────────────────────────────────────
  build-test:
    name: 🔨 Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint || true   # non-blocking — remove "|| true" to enforce

      - name: Build (type-check + vite build)
        run: bun run build

      - name: Build success
        run: echo "✅ Build completed successfully"

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Prepare release infra (APIs + Artifact Registry)
  # Runs on: push to master, manual dispatch with deploy=true
  # Skipped on: pull_requests, manual dispatch with deploy=false
  # ────────────────────────────────────────────────────────────────────────────
  prepare-release-infra:
    name: ☁️ Prepare Release Infra
    runs-on: ubuntu-latest
    needs: build-test
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')

    permissions:
      id-token: write      # needed for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Verify secrets are injected ───────────────────────────────────────
      - name: Verify GCP secrets are set
        env:
          WIF: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          SA:  ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          MISSING=0
          if [ -z "${WIF}" ]; then
            echo "❌ GCP_WORKLOAD_IDENTITY_PROVIDER is EMPTY or NOT SET"
            MISSING=1
          else
            echo "✅ GCP_WORKLOAD_IDENTITY_PROVIDER is set (length: ${#WIF})"
          fi
          if [ -z "${SA}" ]; then
            echo "❌ GCP_SERVICE_ACCOUNT is EMPTY or NOT SET"
            MISSING=1
          else
            echo "✅ GCP_SERVICE_ACCOUNT is set (length: ${#SA})"
          fi
          if [ "$MISSING" -eq 1 ]; then
            echo ""
            echo "👉 Go to: https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "   and add both secrets:"
            echo "   - GCP_WORKLOAD_IDENTITY_PROVIDER  (from: terraform output workload_identity_provider)"
            echo "   - GCP_SERVICE_ACCOUNT             (from: terraform output github_actions_sa_email)"
            exit 1
          fi

      # ── Authenticate to GCP via Workload Identity Federation ─────────────
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # ── Set up gcloud CLI ─────────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Enable required GCP APIs
        run: |
          gcloud services enable \
            artifactregistry.googleapis.com \
            run.googleapis.com \
            cloudbuild.googleapis.com \
            --quiet

      - name: Ensure Artifact Registry repository exists
        run: |
          if ! gcloud artifacts repositories describe "${{ env.REPO_NAME }}" \
              --location="${{ env.REGION }}" --quiet 2>/dev/null; then
            echo "Repository not found. Creating ${REPO_NAME}..."
            gcloud artifacts repositories create "${{ env.REPO_NAME }}" \
              --repository-format=docker \
              --location="${{ env.REGION }}" \
              --description="Docker images for ${{ env.SERVICE_NAME }}"
          else
            echo "Repository ${REPO_NAME} already exists."
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3A — App branch: build/push app image to Artifact Registry
  # ────────────────────────────────────────────────────────────────────────────
  app-image-release:
    name: 🚀 App Image -> Artifact Registry
    runs-on: ubuntu-latest
    needs: prepare-release-infra
    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── Configure Docker to push to Artifact Registry ─────────────────────
      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # ── Build + push app Docker image ─────────────────────────────────────
      - name: Build app Docker image
        run: |
          docker build \
            --cache-from ${{ env.IMAGE_BASE }}:latest \
            -t ${{ env.IMAGE_BASE }}:${{ steps.sha.outputs.short_sha }} \
            -t ${{ env.IMAGE_BASE }}:latest \
            .

      - name: Push app image to Artifact Registry
        run: |
          docker push ${{ env.IMAGE_BASE }}:${{ steps.sha.outputs.short_sha }}
          docker push ${{ env.IMAGE_BASE }}:latest

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3D — Trivy image scan (app image)
  # Runs after the app image is pushed so Trivy can pull it from Artifact Registry.
  # Blocks the deploy pipeline on CRITICAL vulnerabilities.
  # ────────────────────────────────────────────────────────────────────────────
  trivy-image-app:
    name: 🔒 Trivy Image Scan (app)
    runs-on: ubuntu-latest
    needs: app-image-release
    permissions:
      id-token: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth (so Trivy can pull from Artifact Registry)
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # ── Download the official HTML template ───────────────────────────────
      - name: Download Trivy HTML template
        run: |
          mkdir -p .trivy-templates
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl \
            -o .trivy-templates/html.tpl

      # ── HTML report (generated first so it always exists for upload) ──────
      - name: Trivy image scan (HTML report)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_BASE }}:${{ steps.sha.outputs.short_sha }}
          scanners: vuln,secret
          format: template
          template: "@.trivy-templates/html.tpl"
          output: trivy-app-image-report.html
          severity: CRITICAL,HIGH,MEDIUM,LOW
          trivyignores: .trivyignore

      # ── SARIF → GitHub Security tab ───────────────────────────────────────
      - name: Trivy image scan (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_BASE }}:${{ steps.sha.outputs.short_sha }}
          scanners: vuln,secret
          format: sarif
          output: trivy-app-image.sarif
          severity: CRITICAL,HIGH,MEDIUM,LOW
          trivyignores: .trivyignore

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-app-image.sarif
          category: trivy-app-image

      # ── Upload HTML + SARIF as artifact ───────────────────────────────────
      - name: Upload Trivy app image reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-app-image-report-${{ github.run_id }}
          path: |
            trivy-app-image-report.html
            trivy-app-image.sarif
          if-no-files-found: warn
          retention-days: 30

      # ── Table summary (informational — does not block for demo) ──────────
      - name: Trivy image scan (table summary — non-blocking)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_BASE }}:${{ steps.sha.outputs.short_sha }}
          scanners: vuln,secret
          format: table
          severity: CRITICAL,HIGH,MEDIUM,LOW
          trivyignores: .trivyignore
          exit-code: "0"


  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3E — Trivy image scan (Playwright test image)
  # ────────────────────────────────────────────────────────────────────────────
  trivy-image-playwright:
    name: 🔒 Trivy Image Scan (playwright)
    runs-on: ubuntu-latest
    needs: playwright-release
    permissions:
      id-token: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # ── Download the official HTML template ───────────────────────────────
      - name: Download Trivy HTML template
        run: |
          mkdir -p .trivy-templates
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl \
            -o .trivy-templates/html.tpl

      # ── HTML report (generated first so it always exists for upload) ──────
      - name: Trivy image scan (HTML report)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          image-ref: ${{ env.PW_IMAGE }}:${{ steps.sha.outputs.short_sha }}
          scanners: vuln,secret
          format: template
          template: "@.trivy-templates/html.tpl"
          output: trivy-pw-image-report.html
          severity: CRITICAL,HIGH,MEDIUM,LOW
          trivyignores: .trivyignore

      # ── SARIF → GitHub Security tab ───────────────────────────────────────
      - name: Trivy image scan (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          image-ref: ${{ env.PW_IMAGE }}:${{ steps.sha.outputs.short_sha }}
          scanners: vuln,secret
          format: sarif
          output: trivy-pw-image.sarif
          severity: CRITICAL,HIGH,MEDIUM,LOW
          trivyignores: .trivyignore

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-pw-image.sarif
          category: trivy-playwright-image

      # ── Upload HTML + SARIF as artifact ───────────────────────────────────
      - name: Upload Trivy playwright image reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-pw-image-report-${{ github.run_id }}
          path: |
            trivy-pw-image-report.html
            trivy-pw-image.sarif
          if-no-files-found: warn
          retention-days: 30

      # ── Table summary (informational — does not block) ────────────────────
      - name: Trivy image scan (table — informational only)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          image-ref: ${{ env.PW_IMAGE }}:${{ steps.sha.outputs.short_sha }}
          scanners: vuln,secret
          format: table
          severity: CRITICAL,HIGH,MEDIUM,LOW
          trivyignores: .trivyignore
          exit-code: "0"

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3C — Deploy to Cloud Run (separate graph node)
  # Now depends on trivy-image-app passing (no CRITICAL CVEs in app image)
  # ────────────────────────────────────────────────────────────────────────────
  cloud-run-deploy:
    name: ☁️ Cloud Run Deploy
    runs-on: ubuntu-latest
    needs:
      - app-image-release
      - trivy-image-app     # only deploy if image passes the CRITICAL CVE gate
    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy app image to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --image="${{ env.IMAGE_BASE }}:${{ steps.sha.outputs.short_sha }}" \
            --region="${{ env.REGION }}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=80 \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --quiet

      - name: Show Cloud Run URL
        run: |
          CLOUD_RUN_URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --region="${{ env.REGION }}" \
            --format='value(status.url)')
          echo "Cloud Run URL: ${CLOUD_RUN_URL}"
          echo "Set GitHub variable DAST_TARGET_URL to this URL once for ZAP scans."

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3B — Playwright branch: build/push Playwright test image
  # ────────────────────────────────────────────────────────────────────────────
  playwright-release:
    name: 🎭 Playwright Image -> Artifact Registry
    runs-on: ubuntu-latest
    needs: prepare-release-infra
    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # ── Build + push Playwright test image ────────────────────────────────
      - name: Build Playwright Docker image
        run: |
          docker build \
            -f tests/Dockerfile \
            -t ${{ env.PW_IMAGE }}:${{ steps.sha.outputs.short_sha }} \
            -t ${{ env.PW_IMAGE }}:latest \
            .

      - name: Push Playwright image to Artifact Registry
        run: |
          docker push ${{ env.PW_IMAGE }}:${{ steps.sha.outputs.short_sha }}
          docker push ${{ env.PW_IMAGE }}:latest

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4 — Update GitOps manifests after both image branches finish
  # ────────────────────────────────────────────────────────────────────────────
  update-k8s-tags:
    name: 📝 Update K8s Image Tags (GitOps)
    runs-on: ubuntu-latest
    needs:
      - app-image-release
      - playwright-release
      - trivy-image-app        # block GitOps push if app image has CRITICAL CVEs
      - trivy-image-playwright # wait for playwright scan (informational)
    outputs:
      short_sha: ${{ steps.sha.outputs.short_sha }}
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA
        id: sha
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── Prepare cluster BEFORE committing to Git ──────────────────────────
      # The ar-pull-secret and network policies must exist in the app namespace
      # BEFORE we push the Git commit that triggers Argo CD sync + PostSync hook.
      # If we do this after the commit, Argo may start the hook pod before the
      # secret exists, causing ImagePullBackOff.
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: devops-cluster
          location: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Pre-create ar-pull-secret and apply network policies
        run: |
          kubectl apply -f k8s/namespaces.yaml
          kubectl apply -f k8s/security/allow-playwright-hook.yaml

          # Refresh image-pull secret in both namespaces so the PostSync hook
          # pod can pull the Playwright image from Artifact Registry
          for NS in app testing; do
            kubectl create secret docker-registry ar-pull-secret \
              --docker-server=europe-west1-docker.pkg.dev \
              --docker-username=oauth2accesstoken \
              --docker-password="$(gcloud auth print-access-token)" \
              --namespace=${NS} \
              --dry-run=client -o yaml | kubectl apply -f -
          done

      # ── Update GitOps manifests — Argo CD picks these up and auto-syncs ───
      # After the app sync, Argo CD runs playwright-hook.yaml as a PostSync
      # hook job (visible in the Argo CD UI under login-page-replicator app).
      - name: Update image tags in k8s manifests
        run: |
          SHORT_SHA=${{ steps.sha.outputs.short_sha }}

          # Update app deployment image tag
          sed -i "s|${{ env.IMAGE_BASE }}:[^ ]*|${{ env.IMAGE_BASE }}:${SHORT_SHA}|g" \
            k8s/app/deployment.yaml

          # Update Playwright PostSync hook image tag
          sed -i "s|${{ env.PW_IMAGE }}:[^ ]*|${{ env.PW_IMAGE }}:${SHORT_SHA}|g" \
            k8s/app/playwright-hook.yaml

          echo "--- Updated deployment.yaml ---"
          grep "image:" k8s/app/deployment.yaml

          echo "--- Updated playwright-hook.yaml ---"
          grep "image:" k8s/app/playwright-hook.yaml

      - name: Commit and push updated manifests
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add k8s/app/deployment.yaml k8s/app/playwright-hook.yaml
          git diff --cached --quiet || \
            (git commit -m "ci: update image tags to ${{ steps.sha.outputs.short_sha }}" && git push)

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 5 — Wait for Argo CD PostSync hook jobs (isolated per test) & collect results
  #
  # Argo CD automatically creates one PostSync job per test marker in the app namespace
  # (playwright-e2e-tests-t1 ... playwright-e2e-tests-t6).
  # Each matrix run waits for one job, then uploads HTML/JUnit artifacts.
  #
  # ✅ You can also see the job pass/fail directly in the Argo CD UI under
  #    the "login-page-replicator" application resource tree.
  # ────────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: 🎭 Playwright e2e (GKE via Argo CD hook) — ${{ matrix.test_id }}
    runs-on: ubuntu-latest
    needs: update-k8s-tags
    strategy:
      fail-fast: false
      matrix:
        include:
          - test_id: t1
            job_name: playwright-e2e-tests-t1
          - test_id: t2
            job_name: playwright-e2e-tests-t2
          - test_id: t3
            job_name: playwright-e2e-tests-t3
          - test_id: t4
            job_name: playwright-e2e-tests-t4
          - test_id: t5
            job_name: playwright-e2e-tests-t5
          - test_id: t6
            job_name: playwright-e2e-tests-t6

    permissions:
      contents: read
      id-token: write      # needed for Workload Identity Federation
      checks: write        # publish JUnit summary as a GitHub check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Authenticate to GCP ───────────────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # ── Get GKE credentials ───────────────────────────────────────────────
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: devops-cluster
          location: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}

      # ── Apply cluster prerequisites ───────────────────────────────────────
      # Note: ar-pull-secret was already created in update-k8s-tags (before the Git
      # commit) so the PostSync hook pod can pull its image immediately.
      - name: Apply cluster prerequisites
        run: |
          kubectl apply -f k8s/namespaces.yaml
          kubectl apply -f k8s/testing/serviceaccount.yaml
          kubectl apply -f k8s/security/allow-testing-to-app.yaml
          kubectl apply -f k8s/security/allow-playwright-hook.yaml

      # ── Wait for Argo CD to roll out the new app image ────────────────────
      - name: Wait for Argo CD rollout
        run: |
          SHORT_SHA=${{ needs.update-k8s-tags.outputs.short_sha }}
          echo "Waiting for Argo CD to deploy image tag: ${SHORT_SHA}"
          FOUND=0
          for i in {1..60}; do
            DEPLOYED=$(kubectl get deployment ${{ env.SERVICE_NAME }} -n app \
              -o jsonpath='{.spec.template.spec.containers[?(@.name=="app")].image}' 2>/dev/null || true)
            if echo "${DEPLOYED}" | grep -q ":${SHORT_SHA}$"; then
              FOUND=1
              break
            fi
            echo "Attempt ${i}/60 — current image: ${DEPLOYED:-<not found>}"
            sleep 10
          done

          if [ "${FOUND}" -ne 1 ]; then
            echo "❌ Timed out — Argo CD did not apply tag ${SHORT_SHA} within 10 minutes."
            kubectl get deployment ${{ env.SERVICE_NAME }} -n app -o yaml || true
            exit 1
          fi

          echo "✅ Argo CD deployed ${SHORT_SHA}. Waiting for rollout to complete..."
          kubectl rollout status deployment/${{ env.SERVICE_NAME }} -n app --timeout=300s
          kubectl wait --for=jsonpath='{.subsets[0].addresses[0].ip}' \
            endpoints/${{ env.SERVICE_NAME }} -n app --timeout=120s

      # ── Wait for Argo CD PostSync hook job to appear and finish ───────────
      # Argo CD creates one hook job per test marker; this matrix run waits for
      # its assigned job only and collects that job's artifacts.
      - name: Wait for Argo CD PostSync hook job
        run: |
          JOB_NAME="${{ matrix.job_name }}"
          echo "Waiting for Argo CD to create ${JOB_NAME} PostSync hook..."
          for i in {1..60}; do
            if kubectl get job "${JOB_NAME}" -n app &>/dev/null; then
              echo "✅ Job ${JOB_NAME} found in app namespace."
              break
            fi
            echo "Attempt ${i}/60 — job not yet created by Argo CD..."
            sleep 5
          done

          kubectl get job "${JOB_NAME}" -n app || \
            { echo "❌ Job never appeared. Is Argo CD running and syncing?"; exit 1; }

          # Poll until job reaches a terminal state (Complete or Failed)
          echo "Waiting for ${JOB_NAME} job to finish..."
          TIMEOUT=600
          ELAPSED=0
          JOB_STATUS=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            COMPLETE=$(kubectl get job "${JOB_NAME}" -n app \
              -o jsonpath='{.status.conditions[?(@.type=="Complete")].status}' 2>/dev/null || true)
            FAILED=$(kubectl get job "${JOB_NAME}" -n app \
              -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}' 2>/dev/null || true)

            if [ "${COMPLETE}" = "True" ]; then
              echo "✅ Job completed successfully."
              break
            elif [ "${FAILED}" = "True" ]; then
              echo "❌ Job failed."
              JOB_STATUS=1
              break
            fi

            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done

          if [ $ELAPSED -ge $TIMEOUT ] && [ "${COMPLETE}" != "True" ]; then
            echo "⏰ Timed out waiting for job after ${TIMEOUT}s."
            JOB_STATUS=1
          fi

          # Fetch pod logs to a file — using a file avoids bash $() stripping
          # trailing newlines which would corrupt the base64 tarball.
          echo "=== Fetching pod logs ==="
          mkdir -p artifacts
          kubectl logs -l job-name="${JOB_NAME}" -n app \
            --prefix=false 2>/dev/null > /tmp/pod-logs.txt || true

          # Print readable portion (before the artifact sentinel line)
          sed '/---PLAYWRIGHT-ARTIFACTS-START---/,$d' /tmp/pod-logs.txt

          # Extract the base64 block between the sentinel markers into its own file
          sed -n '/---PLAYWRIGHT-ARTIFACTS-START---/,/---PLAYWRIGHT-ARTIFACTS-END---/p' \
            /tmp/pod-logs.txt \
            | grep -v '^---PLAYWRIGHT-ARTIFACTS' \
            > /tmp/artifacts.b64

          if [ -s /tmp/artifacts.b64 ]; then
            echo "Extracting artifact tarball..."
            base64 -d /tmp/artifacts.b64 | tar -xzf - -C artifacts/ || true
            echo "Artifact contents:"
            find artifacts/ -type f | head -40
          else
            echo "⚠️  No artifact tarball found in pod logs."
          fi

          [ "${JOB_STATUS}" -ne 0 ] && exit 1 || true

      # ── Always upload raw artifact bundle ─────────────────────────────────
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-gke-${{ matrix.test_id }}-${{ github.run_id }}
          path: |
            artifacts/playwright-report/
            artifacts/test-results/
          if-no-files-found: warn
          retention-days: 14

      # ── Publish JUnit check — requires actual test results ────────────────
      - name: Publish JUnit report
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: artifacts/test-results/junit.xml
          check_name: Playwright E2E Results (GKE ${{ matrix.test_id }})
          detailed_summary: true
          fail_on_failure: true
          require_tests: true


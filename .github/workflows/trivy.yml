name: 🔒 Trivy Security Scans

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    # Run a full scan every Monday at 02:00 UTC
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Filesystem / dependency scan
  # Scans for CVEs in npm deps, secrets, and IaC misconfigs.
  # Outputs: SARIF (→ Security tab) + HTML report (→ artifact) + table (log)
  # ────────────────────────────────────────────────────────────────────────────
  trivy-fs:
    name: 📁 Trivy Filesystem Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Download the official HTML template from the Trivy repo ──────────
      # We fetch it once so all trivy-action steps can reference it by path.
      - name: Download Trivy HTML template
        run: |
          mkdir -p .trivy-templates
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl \
            -o .trivy-templates/html.tpl

      # ── HTML report (generated first so it always exists for upload) ──────
      - name: Trivy filesystem scan (HTML report)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: template
          template: "@.trivy-templates/html.tpl"
          output: trivy-fs-report.html
          severity: CRITICAL,HIGH,MEDIUM,LOW
          trivyignores: .trivyignore

      # ── SARIF → GitHub Security tab ───────────────────────────────────────
      - name: Trivy filesystem scan (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH,MEDIUM,LOW
          trivyignores: .trivyignore

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

      # ── Upload HTML + SARIF artifact ──────────────────────────────────────
      - name: Upload Trivy filesystem reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report-${{ github.run_id }}
          path: |
            trivy-fs-report.html
            trivy-fs.sarif
          if-no-files-found: warn
          retention-days: 30

      # ── Table summary + gate: informational (does not block for demo) ──────
      - name: Trivy filesystem scan (table summary)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: table
          severity: CRITICAL,HIGH,MEDIUM,LOW
          trivyignores: .trivyignore
          exit-code: "0"

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Dockerfile / IaC misconfiguration scan
  # Outputs: SARIF (→ Security tab) + HTML report (→ artifact) + table (log)
  # ────────────────────────────────────────────────────────────────────────────
  trivy-config:
    name: 🛠️ Trivy IaC / Config Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Download the official HTML template ───────────────────────────────
      - name: Download Trivy HTML template
        run: |
          mkdir -p .trivy-templates
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl \
            -o .trivy-templates/html.tpl

      # ── HTML report ───────────────────────────────────────────────────────
      - name: Trivy config scan (HTML report)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: .
          format: template
          template: "@.trivy-templates/html.tpl"
          output: trivy-config-report.html
          severity: CRITICAL,HIGH,MEDIUM,LOW
          trivyignores: .trivyignore

      # ── SARIF → GitHub Security tab ───────────────────────────────────────
      - name: Trivy config scan (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: CRITICAL,HIGH,MEDIUM,LOW
          trivyignores: .trivyignore

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

      # ── Upload HTML + SARIF artifact ──────────────────────────────────────
      - name: Upload Trivy config reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-config-report-${{ github.run_id }}
          path: |
            trivy-config-report.html
            trivy-config.sarif
          if-no-files-found: warn
          retention-days: 30

      # ── Table summary (informational — does not block) ────────────────────
      - name: Trivy config scan (table summary)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH,MEDIUM,LOW
          trivyignores: .trivyignore
          exit-code: "0"


name: 🔒 Trivy Security Scans

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    # Run a full scan every Monday at 02:00 UTC
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # upload SARIF to GitHub Security tab

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Filesystem / dependency scan
  # Scans the source tree for:
  #   • Known CVEs in package.json dependencies
  #   • Secrets / hard-coded credentials
  #   • Misconfigured IaC files (Dockerfile, k8s YAML, Terraform)
  # Outputs: SARIF (→ Security tab) + HTML report (→ artifact) + table (log)
  # ────────────────────────────────────────────────────────────────────────────
  trivy-fs:
    name: 📁 Trivy Filesystem Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Install Trivy CLI ─────────────────────────────────────────────────
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      # ── SARIF → GitHub Security tab ───────────────────────────────────────
      - name: Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

      # ── HTML report ───────────────────────────────────────────────────────
      - name: Trivy filesystem scan (HTML report)
        if: always()
        run: |
          trivy fs . \
            --scanners vuln,secret,misconfig \
            --severity CRITICAL,HIGH,MEDIUM \
            --ignore-unfixed \
            --ignorefile .trivyignore \
            --format template \
            --template "@/usr/local/share/trivy/templates/html.tpl" \
            --output trivy-fs-report.html || true

      # ── Table summary + gate: fail on CRITICAL/HIGH ───────────────────────
      - name: Trivy filesystem scan (table — blocking on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: "1"

      # ── Upload all reports as a single artifact ───────────────────────────
      - name: Upload Trivy filesystem reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report-${{ github.run_id }}
          path: |
            trivy-fs-report.html
            trivy-fs.sarif
          if-no-files-found: warn
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Dockerfile / IaC misconfiguration scan
  # Checks Dockerfiles and k8s manifests for security best-practice violations.
  # Outputs: SARIF (→ Security tab) + HTML report (→ artifact) + table (log)
  # ────────────────────────────────────────────────────────────────────────────
  trivy-config:
    name: 🛠️ Trivy IaC / Config Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Install Trivy CLI ─────────────────────────────────────────────────
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      # ── SARIF → GitHub Security tab ───────────────────────────────────────
      - name: Trivy config scan (SARIF)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: CRITICAL,HIGH,MEDIUM
          trivyignores: .trivyignore

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

      # ── HTML report ───────────────────────────────────────────────────────
      - name: Trivy config scan (HTML report)
        if: always()
        run: |
          trivy config . \
            --severity CRITICAL,HIGH,MEDIUM \
            --ignorefile .trivyignore \
            --format template \
            --template "@/usr/local/share/trivy/templates/html.tpl" \
            --output trivy-config-report.html || true

      # ── Table summary (informational — does not block) ────────────────────
      - name: Trivy config scan (table summary)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore
          exit-code: "0"

      # ── Upload all reports as a single artifact ───────────────────────────
      - name: Upload Trivy config reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-config-report-${{ github.run_id }}
          path: |
            trivy-config-report.html
            trivy-config.sarif
          if-no-files-found: warn
          retention-days: 30
